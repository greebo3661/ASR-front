server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass __ASR_API_BASE__/api/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs {
    proxy_pass __ASR_API_BASE__/docs;
  }

  location /openapi.json {
    proxy_pass __ASR_API_BASE__/openapi.json;
  }

  # basic hardening for large uploads from browser -> gateway
  client_max_body_size 2048m;

  # optional: increase timeouts for slow networks
  proxy_read_timeout 3600s;
  proxy_send_timeout 3600s;
}
